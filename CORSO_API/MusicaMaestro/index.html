<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalogo Musicale</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        body { background-color: #f8f9fa; }
        .section-card { border-radius: 12px; }
        .table-responsive { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold fs-4"><i class="bi bi-music-note-beamed me-2"></i>Catalogo Musicale</span>
            <div>
                <a href="#section-canzoni" class="btn btn-outline-light btn-sm me-2">Canzoni</a>
                <a href="#section-clienti" class="btn btn-outline-light btn-sm">Clienti</a>
            </div>
        </div>
    </nav>

    <div class="container pb-5">

        <!-- ===== CANZONI ===== -->
        <div id="section-canzoni" class="card shadow-sm section-card mb-5">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0"><i class="bi bi-vinyl-fill me-2"></i>Canzoni</h5>
                <button class="btn btn-light btn-sm" onclick="openCanzoneModal()">
                    <i class="bi bi-plus-lg me-1"></i>Nuova canzone
                </button>
            </div>
            <div class="card-body">
                <!-- Search -->
                <div class="input-group mb-3" style="max-width:360px;">
                    <input id="searchTitolo" type="text" class="form-control" placeholder="Cerca per titolo…" />
                    <button class="btn btn-outline-primary" onclick="searchCanzoni()"><i class="bi bi-search"></i></button>
                    <button class="btn btn-outline-secondary" onclick="loadCanzoni()"><i class="bi bi-x-lg"></i></button>
                </div>
                <!-- Table -->
                <div class="table-responsive">
                    <table class="table table-hover table-bordered align-middle mb-0">
                        <thead class="table-primary sticky-top">
                            <tr>
                                <th>#</th>
                                <th>Titolo</th>
                                <th>Artista</th>
                                <th>Album</th>
                                <th>Genere</th>
                                <th>Durata</th>
                                <th class="text-center">Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="canzoniTableBody">
                            <tr><td colspan="7" class="text-center text-muted py-4">Caricamento…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ===== CLIENTI ===== -->
        <div id="section-clienti" class="card shadow-sm section-card mb-5">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0"><i class="bi bi-people-fill me-2"></i>Clienti</h5>
                <button class="btn btn-light btn-sm" onclick="openClienteModal()">
                    <i class="bi bi-plus-lg me-1"></i>Nuovo cliente
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover table-bordered align-middle mb-0">
                        <thead class="table-success sticky-top">
                            <tr>
                                <th>#</th>
                                <th>Nome</th>
                                <th>Cognome</th>
                                <th>Email</th>
                                <th>Telefono</th>
                                <th class="text-center">Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="clientiTableBody">
                            <tr><td colspan="6" class="text-center text-muted py-4">Caricamento…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== MODAL CANZONE ===== -->
    <div class="modal fade" id="canzoneModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="canzoneModalTitle">Canzone</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="canzoneId" />
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Titolo <span class="text-danger">*</span></label>
                        <input id="canzoneTitolo" type="text" class="form-control" placeholder="Titolo della canzone" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Artista <span class="text-danger">*</span></label>
                        <input id="canzoneArtista" type="text" class="form-control" placeholder="Nome artista o band" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Album <span class="text-danger">*</span></label>
                        <input id="canzoneAlbum" type="text" class="form-control" placeholder="Nome album" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Genere</label>
                        <input id="canzoneGenere" type="text" class="form-control" placeholder="Es. Rock, Pop, Jazz…" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Durata (secondi)</label>
                        <input id="canzoneDurata" type="number" min="1" class="form-control" placeholder="Es. 240" />
                    </div>
                    <div id="canzoneError" class="alert alert-danger d-none"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                    <button type="button" class="btn btn-primary" onclick="saveCanzone()">
                        <i class="bi bi-floppy me-1"></i>Salva
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== MODAL CLIENTE ===== -->
    <div class="modal fade" id="clienteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="clienteModalTitle">Cliente</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="clienteId" />
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
                        <input id="clienteNome" type="text" class="form-control" placeholder="Nome" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Cognome <span class="text-danger">*</span></label>
                        <input id="clienteCognome" type="text" class="form-control" placeholder="Cognome" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                        <input id="clienteEmail" type="email" class="form-control" placeholder="email@esempio.it" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Telefono</label>
                        <input id="clienteTelefono" type="tel" class="form-control" placeholder="Es. 3401234567" />
                    </div>
                    <div id="clienteError" class="alert alert-danger d-none"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                    <button type="button" class="btn btn-success" onclick="saveCliente()">
                        <i class="bi bi-floppy me-1"></i>Salva
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== CONFIRM DELETE MODAL ===== -->
    <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Conferma eliminazione</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="confirmDeleteMessage">Sei sicuro di voler eliminare questo elemento?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
                        <i class="bi bi-trash me-1"></i>Elimina
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toastMsg" class="toast align-items-center text-white border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body fw-semibold" id="toastText"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'http://localhost:3000/api/v2';

        /* ── Utilities ─────────────────────────────────────────────── */
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toastMsg');
            toast.className = `toast align-items-center text-white border-0 bg-${type}`;
            document.getElementById('toastText').textContent = message;
            bootstrap.Toast.getOrCreateInstance(toast, { delay: 3000 }).show();
        }

        function confirmDelete(message, onConfirm) {
            document.getElementById('confirmDeleteMessage').textContent = message;
            const btn = document.getElementById('confirmDeleteBtn');
            const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('confirmDeleteModal'));
            btn.onclick = () => { modal.hide(); onConfirm(); };
            modal.show();
        }

        // Converte secondi in formato mm:ss
        function formatDurata(secondi) {
            if (!secondi) return '—';
            const m = Math.floor(secondi / 60);
            const s = secondi % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        /* ══════════════════════════════════════════════════════════════
           CANZONI
        ══════════════════════════════════════════════════════════════ */
        async function loadCanzoni() {
            document.getElementById('searchTitolo').value = '';
            try {
                const res = await fetch(`${API}/canzoni`);
                const data = await res.json();
                renderCanzoni(data);
            } catch {
                showToast('Errore nel caricamento delle canzoni', 'danger');
            }
        }

        async function searchCanzoni() {
            const titolo = document.getElementById('searchTitolo').value.trim();
            if (!titolo) { loadCanzoni(); return; }
            try {
                const res = await fetch(`${API}/canzoni/search?titolo=${encodeURIComponent(titolo)}`);
                const data = await res.json();
                renderCanzoni(data);
            } catch {
                showToast('Errore nella ricerca', 'danger');
            }
        }

        function renderCanzoni(rows) {
            const tbody = document.getElementById('canzoniTableBody');
            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">Nessuna canzone trovata.</td></tr>';
                return;
            }
            tbody.innerHTML = rows.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td>${escHtml(c.titolo)}</td>
                    <td>${escHtml(c.artista)}</td>
                    <td>${escHtml(c.album)}</td>
                    <td>${escHtml(c.genere ?? '—')}</td>
                    <td>${formatDurata(c.durata_secondi)}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-primary me-1" title="Modifica" onclick="openCanzoneModal(${c.id})">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" title="Elimina" onclick="deleteCanzone(${c.id}, '${escHtml(c.titolo)}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>`).join('');
        }

        function openCanzoneModal(id = null) {
            document.getElementById('canzoneId').value = '';
            document.getElementById('canzoneTitolo').value = '';
            document.getElementById('canzoneArtista').value = '';
            document.getElementById('canzoneAlbum').value = '';
            document.getElementById('canzoneGenere').value = '';
            document.getElementById('canzoneDurata').value = '';
            document.getElementById('canzoneError').classList.add('d-none');

            if (id) {
                document.getElementById('canzoneModalTitle').textContent = 'Modifica canzone';
                fetch(`${API}/canzoni/${id}`)
                    .then(r => r.json())
                    .then(c => {
                        document.getElementById('canzoneId').value = c.id;
                        document.getElementById('canzoneTitolo').value = c.titolo;
                        document.getElementById('canzoneArtista').value = c.artista;
                        document.getElementById('canzoneAlbum').value = c.album;
                        document.getElementById('canzoneGenere').value = c.genere ?? '';
                        document.getElementById('canzoneDurata').value = c.durata_secondi ?? '';
                    });
            } else {
                document.getElementById('canzoneModalTitle').textContent = 'Nuova canzone';
            }
            bootstrap.Modal.getOrCreateInstance(document.getElementById('canzoneModal')).show();
        }

        async function saveCanzone() {
            const id = document.getElementById('canzoneId').value;
            const body = {
                titolo:          document.getElementById('canzoneTitolo').value.trim(),
                artista:         document.getElementById('canzoneArtista').value.trim(),
                album:           document.getElementById('canzoneAlbum').value.trim(),
                genere:          document.getElementById('canzoneGenere').value.trim() || null,
                durata_secondi:  document.getElementById('canzoneDurata').value || null
            };

            if (!body.titolo || !body.artista || !body.album) {
                showFieldError('canzoneError', 'Titolo, artista e album sono obbligatori.');
                return;
            }

            const url = id ? `${API}/canzoni/${id}` : `${API}/canzoni`;
            const method = id ? 'PUT' : 'POST';
            try {
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                const data = await res.json();
                if (!res.ok) { showFieldError('canzoneError', data.error ?? 'Errore'); return; }
                bootstrap.Modal.getInstance(document.getElementById('canzoneModal')).hide();
                showToast(id ? 'Canzone aggiornata con successo' : data.message);
                loadCanzoni();
            } catch {
                showFieldError('canzoneError', 'Errore di rete.');
            }
        }

        function deleteCanzone(id, titolo) {
            confirmDelete(`Eliminare la canzone "${titolo}"?`, async () => {
                try {
                    const res = await fetch(`${API}/canzoni/${id}`, { method: 'DELETE' });
                    const data = await res.json();
                    if (!res.ok) { showToast(data.error ?? 'Errore', 'danger'); return; }
                    showToast(data.message);
                    loadCanzoni();
                } catch {
                    showToast('Errore di rete.', 'danger');
                }
            });
        }

        /* ══════════════════════════════════════════════════════════════
           CLIENTI
        ══════════════════════════════════════════════════════════════ */
        async function loadClienti() {
            try {
                const res = await fetch(`${API}/clienti`);
                const data = await res.json();
                renderClienti(data);
            } catch {
                showToast('Errore nel caricamento dei clienti', 'danger');
            }
        }

        function renderClienti(rows) {
            const tbody = document.getElementById('clientiTableBody');
            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Nessun cliente trovato.</td></tr>';
                return;
            }
            tbody.innerHTML = rows.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td>${escHtml(c.nome)}</td>
                    <td>${escHtml(c.cognome)}</td>
                    <td>${escHtml(c.email)}</td>
                    <td>${escHtml(c.telefono ?? '—')}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-success me-1" title="Modifica" onclick="openClienteModal(${c.id})">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" title="Elimina" onclick="deleteCliente(${c.id}, '${escHtml(c.nome)} ${escHtml(c.cognome)}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>`).join('');
        }

        function openClienteModal(id = null) {
            document.getElementById('clienteId').value = '';
            document.getElementById('clienteNome').value = '';
            document.getElementById('clienteCognome').value = '';
            document.getElementById('clienteEmail').value = '';
            document.getElementById('clienteTelefono').value = '';
            document.getElementById('clienteError').classList.add('d-none');

            if (id) {
                document.getElementById('clienteModalTitle').textContent = 'Modifica cliente';
                fetch(`${API}/clienti/${id}`)
                    .then(r => r.json())
                    .then(c => {
                        document.getElementById('clienteId').value = c.id;
                        document.getElementById('clienteNome').value = c.nome;
                        document.getElementById('clienteCognome').value = c.cognome;
                        document.getElementById('clienteEmail').value = c.email;
                        document.getElementById('clienteTelefono').value = c.telefono ?? '';
                    });
            } else {
                document.getElementById('clienteModalTitle').textContent = 'Nuovo cliente';
            }
            bootstrap.Modal.getOrCreateInstance(document.getElementById('clienteModal')).show();
        }

        async function saveCliente() {
            const id = document.getElementById('clienteId').value;
            const body = {
                nome:     document.getElementById('clienteNome').value.trim(),
                cognome:  document.getElementById('clienteCognome').value.trim(),
                email:    document.getElementById('clienteEmail').value.trim(),
                telefono: document.getElementById('clienteTelefono').value.trim() || null
            };

            if (!body.nome || !body.cognome || !body.email) {
                showFieldError('clienteError', 'Nome, cognome ed email sono obbligatori.');
                return;
            }

            const url = id ? `${API}/clienti/${id}` : `${API}/clienti`;
            const method = id ? 'PUT' : 'POST';
            try {
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                const data = await res.json();
                if (!res.ok) { showFieldError('clienteError', data.error ?? 'Errore'); return; }
                bootstrap.Modal.getInstance(document.getElementById('clienteModal')).hide();
                showToast(id ? 'Cliente aggiornato con successo' : data.message);
                loadClienti();
            } catch {
                showFieldError('clienteError', 'Errore di rete.');
            }
        }

        function deleteCliente(id, nome) {
            confirmDelete(`Eliminare il cliente "${nome}"?`, async () => {
                try {
                    const res = await fetch(`${API}/clienti/${id}`, { method: 'DELETE' });
                    const data = await res.json();
                    if (!res.ok) { showToast(data.error ?? 'Errore', 'danger'); return; }
                    showToast(data.message);
                    loadClienti();
                } catch {
                    showToast('Errore di rete.', 'danger');
                }
            });
        }

        /* ── Shared helpers ─────────────────────────────────────────── */
        function showFieldError(elemId, msg) {
            const el = document.getElementById(elemId);
            el.textContent = msg;
            el.classList.remove('d-none');
        }

        function escHtml(str) {
            return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        /* ── Init ───────────────────────────────────────────────────── */
        loadCanzoni();
        loadClienti();

        document.getElementById('searchTitolo').addEventListener('keydown', e => {
            if (e.key === 'Enter') searchCanzoni();
        });
    </script>
</body>
</html>
