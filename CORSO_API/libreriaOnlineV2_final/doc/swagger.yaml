swagger: "2.0"
info:
  title: API Libreria Online
  description: Progetto di esempio per una libreria online
  version: 1.0.0
host: localhost:3000
tags:
  - name: Catalogo
    description: Operazioni relative al catalogo dei libri
  - name: Clienti
    description: Operazioni relative ai clienti
schemes:
  - http
consumes:
  - application/json
produces:
  - application/json
paths:
  /:
    get:
      summary: Endpoint di prova
      description: Endpoint di prova per verificare che il server sia attivo
      responses:
        "200":
          description: OK
  /api/v1/libri:
    get:
      tags:
        - Catalogo
      summary: Recupera l'intero catalogo dei libri
      description: Endpoint per recuperare l'intero catalogo dei libri
      parameters: []
      responses:
        "200":
          description: Catalogo recuperato con successo
          schema:
            type: array
            items:
              $ref: "#/definitions/Libro"
            xml:
              name: main
        "500":
          description: Errore interno del server
          schema:
            type: object
            properties:
              type:
                type: string
                example: object
              properties:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: string
                      example:
                        type: string
                        example: Messaggio di errore
            xml:
              name: main
    post:
      tags:
        - Catalogo
      summary: Aggiunge un nuovo libro
      description: Inserisce un nuovo libro nel catalogo con i dati forniti nel corpo della richiesta
      parameters:
        - name: body
          in: body
          description: Dati del nuovo libro da inserire
          required: true
          schema:
            $ref: "#/definitions/NuovoLibro"
      responses:
        "201":
          description: Libro creato con successo
          schema:
            type: object
            properties:
              type:
                type: string
                example: object
              properties:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      type:
                        type: string
                        example: string
                      example:
                        type: string
                        example: Libro aggiunto con successo
            xml:
              name: main
        "400":
          description: Dati del libro mancanti o non validi
          schema:
            type: object
            properties:
              type:
                type: string
                example: object
              properties:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: string
                      example:
                        type: string
                        example: Dati del libro incompleti
            xml:
              name: main
        "500":
          description: Errore interno del server
          schema:
            type: object
            properties:
              type:
                type: string
                example: object
              properties:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: string
                      example:
                        type: string
                        example: Messaggio di errore
            xml:
              name: main
  /api/v1/libri/search:
    get:
      tags:
        - Catalogo
      summary: Ricerca libri per titolo
      description: Esegue una ricerca case-insensitive sui titoli dei libri in base al parametro fornito
      parameters:
        - name: titolo
          in: query
          description: Stringa da cercare nel titolo del libro
          required: true
          type: string
          example: Node
      responses:
        "200":
          description: Lista dei libri corrispondenti alla ricerca
          schema:
            type: array
            items:
              $ref: "#/definitions/Libro"
            xml:
              name: main
        "400":
          description: Parametro titolo mancante o non valido
          schema:
            type: object
            properties:
              type:
                type: string
                example: object
              properties:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: string
                      example:
                        type: string
                        example: "Parametro 'titolo' errato"
            xml:
              name: main
        "500":
          description: Errore interno del server
          schema:
            type: object
            properties:
              type:
                type: string
                example: object
              properties:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: string
                      example:
                        type: string
                        example: Messaggio di errore
            xml:
              name: main
  /api/v1/libri/{id}:
    get:
      tags:
        - Catalogo
      summary: Recupera il dettaglio di un libro specificato
      description: Restituisce i dettagli di un singolo libro identificato dal suo ID univoco
      parameters:
        - name: id
          in: path
          required: true
          type: integer
          description: ID univoco del libro
          example: 1
      responses:
        "200":
          description: Dettagli del libro trovato
          schema:
            $ref: "#/definitions/Libro"
        "404":
          description: Libro non trovato
          schema:
            type: object
            properties:
              type:
                type: string
                example: object
              properties:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: string
                      example:
                        type: string
                        example: Libro non trovato
            xml:
              name: main
        "500":
          description: Errore interno del server
          schema:
            type: object
            properties:
              type:
                type: string
                example: object
              properties:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: string
                      example:
                        type: string
                        example: Messaggio di errore
            xml:
              name: main
    put:
      tags:
        - Catalogo
      summary: Aggiorna i dettagli di un libro esistente
      description: Aggiorna i dettagli di un libro esistente identificato dal suo ID univoco
      parameters:
        - name: id
          in: path
          required: true
          type: string
      responses:
        "200":
          description: OK
        "404":
          description: Libro non trovato
          schema:
            type: object
            properties:
              type:
                type: string
                example: object
              properties:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: string
                      example:
                        type: string
                        example: Libro non trovato
            xml:
              name: main
        "500":
          description: Errore interno del server
          schema:
            type: object
            properties:
              type:
                type: string
                example: object
              properties:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: string
                      example:
                        type: string
                        example: Messaggio di errore
            xml:
              name: main
    delete:
      tags:
        - Catalogo
      summary: Elimina un libro esistente
      description: Elimina un libro esistente identificato dal suo ID univoco
      parameters:
        - name: id
          in: path
          required: true
          type: string
      responses:
        "200":
          description: OK
        "404":
          description: Libro non trovato
          schema:
            type: object
            properties:
              type:
                type: string
                example: object
              properties:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: string
                      example:
                        type: string
                        example: Libro non trovato
            xml:
              name: main
        "500":
          description: Errore interno del server
          schema:
            type: object
            properties:
              type:
                type: string
                example: object
              properties:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: string
                      example:
                        type: string
                        example: Messaggio di errore
            xml:
              name: main
  /api/v1/clienti:
