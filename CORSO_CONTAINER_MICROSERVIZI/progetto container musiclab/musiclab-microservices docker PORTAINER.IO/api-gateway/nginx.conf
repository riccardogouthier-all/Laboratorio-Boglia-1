# resolver DNS interno di Docker: risolvendo il nome del servizio ad
# ogni richiesta (tramite variabile $upstream) l'api-gateway distribuisce
# il traffico su tutte le repliche quando un servizio viene scalato con
# `docker compose up --scale songs-service=N`.
resolver 127.0.0.11 valid=10s;

server {
    listen 80;

    location /health {
        add_header Content-Type text/plain;
        return 200 "api-gateway ok";
    }

    location /api/canzoni {
        set $songs_upstream http://songs-service:4001;
        proxy_pass $songs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/playlist {
        set $playlist_upstream http://playlist-service:4002;
        proxy_pass $playlist_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
