apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: musiclab
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: localhost:5000/musiclab/api-gateway:1.0.0
          ports:
            - containerPort: 80
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      # NB: la nginx.conf dell'api-gateway deve puntare a "songs-service" e
      # "playlist-service" (nomi dei Service k8s = stessi nomi usati come
      # Host() in Traefik nel docker-compose originale, quindi nessuna modifica richiesta).
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: musiclab
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 80
