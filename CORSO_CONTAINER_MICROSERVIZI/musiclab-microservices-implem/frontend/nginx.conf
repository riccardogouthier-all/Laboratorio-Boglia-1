resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tutte le chiamate /api/* fatte dal browser restano sulla stessa
    # origin (stessa porta 8080): niente CORS, e in produzione basta
    # cambiare l'host del frontend senza toccare il codice JS.
    location /api/ {
        set $gateway http://api-gateway:80;
        proxy_pass $gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
