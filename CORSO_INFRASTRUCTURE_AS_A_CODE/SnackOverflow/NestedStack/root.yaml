AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SnackOverflow - root.yaml: orchestra i 4 nested stack
  (network, security, data, compute). Un genitore, quattro figli:
  gli output degli uni diventano i parametri degli altri via !GetAtt.

Parameters:
  TemplateBaseURL:
    Type: String
    Description: >
      URL HTTPS della cartella S3 dove sono stati caricati i 4 template
      figli (es. https://IL_TUO_BUCKET.s3.amazonaws.com/snackoverflow)

  EnvType:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev
    Description: Ambiente - guida il sizing tramite i Mapping nei figli

  CreateDatabase:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Se false, salta la creazione dell'RDS in data.yaml

Resources:

  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub '${TemplateBaseURL}/network.yaml'

  SecurityStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub '${TemplateBaseURL}/security.yaml'
      Parameters:
        VpcId: !GetAtt NetworkStack.Outputs.VpcId

  DataStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub '${TemplateBaseURL}/data.yaml'
      Parameters:
        EnvType: !Ref EnvType
        CreateDatabase: !Ref CreateDatabase
        PrivateSubnet1: !GetAtt NetworkStack.Outputs.PrivateSubnet1Id
        PrivateSubnet2: !GetAtt NetworkStack.Outputs.PrivateSubnet2Id
        DbSecurityGroupId: !GetAtt SecurityStack.Outputs.DbSecurityGroupId

  ComputeStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub '${TemplateBaseURL}/compute.yaml'
      Parameters:
        EnvType: !Ref EnvType
        VpcId: !GetAtt NetworkStack.Outputs.VpcId
        PublicSubnet1: !GetAtt NetworkStack.Outputs.PublicSubnet1Id
        PublicSubnet2: !GetAtt NetworkStack.Outputs.PublicSubnet2Id
        AppSecurityGroupId: !GetAtt SecurityStack.Outputs.AppSecurityGroupId
        AlbSecurityGroupId: !GetAtt SecurityStack.Outputs.AlbSecurityGroupId

Outputs:
  VpcId:
    Value: !GetAtt NetworkStack.Outputs.VpcId

  BucketName:
    Value: !GetAtt DataStack.Outputs.BucketName

  DbEndpoint:
    Value: !GetAtt DataStack.Outputs.DbEndpoint

  SiteURL:
    Description: URL pubblico dell'app - il criterio di accettazione CA3
    Value: !GetAtt ComputeStack.Outputs.AlbUrl

  AlbDnsName:
    Description: DNS name grezzo dell'ALB
    Value: !GetAtt ComputeStack.Outputs.AlbDnsName