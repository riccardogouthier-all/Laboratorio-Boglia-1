AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SnackOverflow - Figlio 2/4 (security.yaml): catena di Security Group
  a privilegio minimo. ALB <- Internet:80, App <- ALB SG:80, DB <- App SG:3306.
  Le regole sono definite inline nel SG di destinazione (non risorse
  SecurityGroupIngress separate): la catena e' lineare, senza riferimenti
  reciproci, quindi nessuna dipendenza circolare. Con le regole inline
  CloudFormation possiede l'intera lista di ingress e la riscrive per
  intero a ogni update, riconciliando automaticamente eventuali regole
  aggiunte manualmente in console (drift).

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC in cui creare i Security Group (output di network.yaml)

Resources:

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG del load balancer pubblico - HTTP da Internet
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: snackoverflow-alb-sg

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG delle istanze applicative - solo HTTP da ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: snackoverflow-app-sg

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG del database - MySQL solo da app
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref AppSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: snackoverflow-db-sg

Outputs:
  AlbSecurityGroupId:
    Description: SG ALB
    Value: !Ref AlbSecurityGroup

  AppSecurityGroupId:
    Description: SG istanze app
    Value: !Ref AppSecurityGroup

  DbSecurityGroupId:
    Description: SG database
    Value: !Ref DbSecurityGroup