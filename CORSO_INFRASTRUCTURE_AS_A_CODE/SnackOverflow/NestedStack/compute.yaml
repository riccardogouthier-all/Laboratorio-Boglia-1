AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SnackOverflow - Figlio 4/4 (compute.yaml): tier web/app.
  LaunchTemplate (AMI sempre aggiornata via parametro SSM pubblico,
  LabInstanceProfile, bootstrap httpd), Auto Scaling Group su 2 AZ,
  Application Load Balancer come porta d'ingresso.

Parameters:
  EnvType:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev

  VpcId:
    Type: AWS::EC2::VPC::Id

  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id

  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id

  AppSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

  AlbSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Risolta a deploy-time dal parametro pubblico SSM - niente AMI hardcoded

Mappings:
  EnvironmentMap:
    dev:
      InstanceType: t3.micro
      AsgMin: '1'
      AsgMax: '2'
      AsgDesired: '1'
    prod:
      InstanceType: t3.small
      AsgMin: '2'
      AsgMax: '6'
      AsgDesired: '2'

Resources:

  AppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub snackoverflow-${EnvType}-lt
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !FindInMap [EnvironmentMap, !Ref EnvType, InstanceType]
        IamInstanceProfile:
          Name: LabInstanceProfile
        SecurityGroupIds:
          - !Ref AppSecurityGroupId
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            dnf install -y httpd
            systemctl enable httpd
            systemctl start httpd
            TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")  
            AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/availability-zone)
            echo "<h1>SnackOverflow (${EnvType}) - served from ${!AZ}</h1>" > /var/www/html/index.html

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub snackoverflow-${EnvType}-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroupId
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub snackoverflow-${EnvType}-tg
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VpcId
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      TargetType: instance

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

  AppAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub snackoverflow-${EnvType}-asg
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      LaunchTemplate:
        LaunchTemplateId: !Ref AppLaunchTemplate
        Version: !GetAtt AppLaunchTemplate.LatestVersionNumber
      MinSize: !FindInMap [EnvironmentMap, !Ref EnvType, AsgMin]
      MaxSize: !FindInMap [EnvironmentMap, !Ref EnvType, AsgMax]
      DesiredCapacity: !FindInMap [EnvironmentMap, !Ref EnvType, AsgDesired]
      TargetGroupARNs:
        - !Ref AppTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 180

Outputs:
  AlbUrl:
    Description: URL pubblico dell'applicazione
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'

  AlbDnsName:
    Value: !GetAtt ApplicationLoadBalancer.DNSName