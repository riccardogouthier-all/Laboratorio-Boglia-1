AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SnackOverflow - Figlio 3/4 (data.yaml): tier dati.
  S3 per gli asset (immagini snack, DeletionPolicy Retain),
  DynamoDB per le sessioni (PAY_PER_REQUEST, chiave-valore),
  RDS MySQL per gli ordini (dati transazionali, password generata
  in Secrets Manager e letta a runtime via dynamic reference).

Parameters:
  EnvType:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev

  CreateDatabase:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Se false, salta la creazione dell'RDS (utile in aula)

  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id

  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id

  DbSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

Conditions:
  ShouldCreateDatabase: !Equals [!Ref CreateDatabase, 'true']

Mappings:
  EnvironmentMap:
    dev:
      DBInstanceClass: db.t3.micro
      MultiAZ: false
    prod:
      DBInstanceClass: db.t3.small
      MultiAZ: true

Resources:

  AssetsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub snackoverflow-assets-${EnvType}

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub snackoverflow-sessions-${EnvType}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: SessionId
          AttributeType: S
      KeySchema:
        - AttributeName: SessionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ExpiresAt
        Enabled: true

  DbSecret:
    Type: AWS::SecretsManager::Secret
    Condition: ShouldCreateDatabase
    Properties:
      Name: !Sub snackoverflow-${EnvType}-db-secret
      Description: Master password RDS - generata, mai in chiaro nel template
      GenerateSecretString:
        SecretStringTemplate: '{"username":"admin"}'
        GenerateStringKey: password
        ExcludeCharacters: '"@/\'
        PasswordLength: 20

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Condition: ShouldCreateDatabase
    Properties:
      DBSubnetGroupDescription: Subnet private per l'RDS
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  Database:
    Type: AWS::RDS::DBInstance
    Condition: ShouldCreateDatabase
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: mysql
      EngineVersion: '8.0.42'
      DBInstanceClass: !FindInMap [EnvironmentMap, !Ref EnvType, DBInstanceClass]
      MultiAZ: !FindInMap [EnvironmentMap, !Ref EnvType, MultiAZ]
      AllocatedStorage: '20'
      StorageType: gp2
      DBName: snackorders
      MasterUsername: admin
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DbSecret}:SecretString:password}}'
      VPCSecurityGroups:
        - !Ref DbSecurityGroupId
      DBSubnetGroupName: !Ref DbSubnetGroup
      PubliclyAccessible: false
      BackupRetentionPeriod: 1

Outputs:
  BucketName:
    Description: Bucket S3 per gli asset
    Value: !Ref AssetsBucket

  TableName:
    Description: Tabella DynamoDB per le sessioni
    Value: !Ref SessionsTable

  DbEndpoint:
    Description: Endpoint RDS (vuoto se CreateDatabase=false)
    Value: !If [ShouldCreateDatabase, !GetAtt Database.Endpoint.Address, 'none']